<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1560" viewBox="0 0 1900 1560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .accent { fill: #eff6ff; stroke: #2563eb; }
      .decision { fill: #fff7ed; stroke: #ea580c; }
      .support { fill: #f8fafc; stroke: #64748b; stroke-dasharray: 8 6; }
      .text { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1900" height="1560" fill="#ffffff" />

  <text x="70" y="60" class="title">HRPO v4 Architecture Graph</text>
  <rect x="80" y="140" width="260" height="100" rx="16" ry="16" class="box accent" />
  <text x="210" y="176" text-anchor="middle" class="text">Phase 1</text>
  <text x="210" y="204" text-anchor="middle" class="small">Start session</text>
  <text x="210" y="226" text-anchor="middle" class="small">generate one trajectory set</text>

  <rect x="80" y="285" width="320" height="150" rx="16" ry="16" class="box support" />
  <text x="240" y="321" text-anchor="middle" class="text">Session Metadata</text>
  <text x="240" y="349" text-anchor="middle" class="small">session id</text>
  <text x="240" y="371" text-anchor="middle" class="small">trajectory location</text>
  <text x="240" y="393" text-anchor="middle" class="small">conversation artifact hashes</text>
  <text x="240" y="415" text-anchor="middle" class="small">config used for the session</text>

  <rect x="80" y="455" width="320" height="140" rx="16" ry="16" class="box support" />
  <text x="240" y="489" text-anchor="middle" class="text">Hyper parameters</text>
  <text x="240" y="517" text-anchor="middle" class="small">prompt</text>
  <text x="240" y="539" text-anchor="middle" class="small">baseline prompt or current active</text>
  <text x="240" y="561" text-anchor="middle" class="small">agent under evaluation</text>
  <text x="240" y="583" text-anchor="middle" class="small">temperature</text>

  <rect x="430" y="140" width="330" height="100" rx="16" ry="16" class="box accent" />
  <text x="595" y="176" text-anchor="middle" class="text">Persist Inputs</text>
  <text x="595" y="204" text-anchor="middle" class="small">store frozen conversations</text>
  <text x="595" y="226" text-anchor="middle" class="small">and record session hashes</text>

  <rect x="800" y="140" width="360" height="118" rx="16" ry="16" class="box accent" />
  <text x="980" y="176" text-anchor="middle" class="text">Phase 2</text>
  <text x="980" y="204" text-anchor="middle" class="small">Run baseline or active candidate</text>
  <text x="980" y="226" text-anchor="middle" class="small">of the agent under evaluation</text>
  <text x="980" y="248" text-anchor="middle" class="small">on the fixed session set</text>

  <rect x="1210" y="140" width="300" height="100" rx="16" ry="16" class="box" />
  <text x="1360" y="176" text-anchor="middle" class="text">Tally Evaluation</text>
  <text x="1360" y="204" text-anchor="middle" class="small">one TallyRunArtifact</text>
  <text x="1360" y="226" text-anchor="middle" class="small">per conversation</text>

  <rect x="1560" y="70" width="280" height="88" rx="16" ry="16" class="box" />
  <text x="1700" y="106" text-anchor="middle" class="text">Single-turn evals</text>
  <text x="1700" y="134" text-anchor="middle" class="small">step-level pass or fail</text>

  <rect x="1560" y="176" width="280" height="88" rx="16" ry="16" class="box" />
  <text x="1700" y="212" text-anchor="middle" class="text">Multi-turn evals</text>
  <text x="1700" y="240" text-anchor="middle" class="small">conversation-level pass or fail</text>

  <rect x="1560" y="282" width="280" height="88" rx="16" ry="16" class="box accent" />
  <text x="1700" y="318" text-anchor="middle" class="text">OverallQuality</text>
  <text x="1700" y="346" text-anchor="middle" class="small">one scalar per conversation</text>

  <rect x="1460" y="410" width="380" height="118" rx="16" ry="16" class="box accent" />
  <text x="1650" y="446" text-anchor="middle" class="text">Checkpoint Outputs</text>
  <text x="1650" y="474" text-anchor="middle" class="small">candidate_score = mean OverallQuality</text>
  <text x="1650" y="496" text-anchor="middle" class="small">guardrail summaries</text>
  <text x="1650" y="518" text-anchor="middle" class="small">weighted evals: more important evals matter more</text>

  <rect x="1420" y="560" width="420" height="122" rx="16" ry="16" class="box support" />
  <text x="1630" y="592" text-anchor="middle" class="text">Checkpoint Record</text>
  <text x="1630" y="618" text-anchor="middle" class="small">checkpoint id, parent id, prompt hash,</text>
  <text x="1630" y="640" text-anchor="middle" class="small">changed block ids, Tally refs, aggregated score,</text>
  <text x="1630" y="662" text-anchor="middle" class="small">weighted guardrails, reflection, accept/reject</text>

  <rect x="1420" y="780" width="300" height="100" rx="16" ry="16" class="box accent" />
  <text x="1570" y="816" text-anchor="middle" class="text">Phase 3</text>
  <text x="1570" y="844" text-anchor="middle" class="small">Analyze failures</text>
  <text x="1570" y="866" text-anchor="middle" class="small">from the checkpoint</text>

  <rect x="1020" y="720" width="300" height="90" rx="16" ry="16" class="box" />
  <text x="1170" y="756" text-anchor="middle" class="text">Failed step-level evals</text>
  <text x="1170" y="784" text-anchor="middle" class="small">single-turn failures</text>

  <rect x="1020" y="845" width="300" height="90" rx="16" ry="16" class="box" />
  <text x="1170" y="881" text-anchor="middle" class="text">Failed conversation evals</text>
  <text x="1170" y="909" text-anchor="middle" class="small">multi-turn failures</text>

  <rect x="660" y="720" width="300" height="90" rx="16" ry="16" class="box accent" />
  <text x="810" y="756" text-anchor="middle" class="text">Conversation-level summary</text>
  <text x="810" y="784" text-anchor="middle" class="small">aggregate failed steps</text>

  <rect x="660" y="845" width="300" height="90" rx="16" ry="16" class="box accent" />
  <text x="810" y="881" text-anchor="middle" class="text">Across all conversations summary</text>
  <text x="810" y="909" text-anchor="middle" class="small">aggregate failed runs</text>

  <rect x="300" y="765" width="300" height="125" rx="16" ry="16" class="box decision" />
  <text x="450" y="801" text-anchor="middle" class="text">Explicit failures?</text>
  <text x="450" y="829" text-anchor="middle" class="small">If no, fall back to low</text>
  <text x="450" y="851" text-anchor="middle" class="small">OverallQuality conversations</text>
  <text x="450" y="873" text-anchor="middle" class="tiny">analysis only, not a new score</text>

  <rect x="80" y="770" width="180" height="95" rx="16" ry="16" class="box accent" />
  <text x="170" y="806" text-anchor="middle" class="text">Target</text>
  <text x="170" y="834" text-anchor="middle" class="small">high-priority blocks</text>

  <rect x="80" y="1090" width="330" height="132" rx="16" ry="16" class="box accent" />
  <text x="245" y="1122" text-anchor="middle" class="text">Phase 4</text>
  <text x="245" y="1150" text-anchor="middle" class="small">Generate next candidate</text>
  <text x="245" y="1172" text-anchor="middle" class="small">start from last accepted candidate</text>
  <text x="245" y="1194" text-anchor="middle" class="small">of the agent under evaluation</text>
  <text x="245" y="1216" text-anchor="middle" class="small">apply checkpoint reflection and mutation logic</text>

  <rect x="80" y="1242" width="330" height="114" rx="16" ry="16" class="box support" />
  <text x="245" y="1274" text-anchor="middle" class="text">Reflection + Metadata</text>
  <text x="245" y="1302" text-anchor="middle" class="small">prior fixes, rejected changes, parent,</text>
  <text x="245" y="1324" text-anchor="middle" class="small">changed blocks, mutation rationale</text>

  <rect x="470" y="1098" width="300" height="100" rx="16" ry="16" class="box accent" />
  <text x="620" y="1134" text-anchor="middle" class="text">Phase 5</text>
  <text x="620" y="1162" text-anchor="middle" class="small">Re-evaluate candidate of the</text>
  <text x="620" y="1184" text-anchor="middle" class="small">agent under evaluation</text>

  <rect x="820" y="1098" width="320" height="100" rx="16" ry="16" class="box accent" />
  <text x="980" y="1134" text-anchor="middle" class="text">Recompute candidate score</text>
  <text x="980" y="1162" text-anchor="middle" class="small">mean OverallQuality across</text>
  <text x="980" y="1184" text-anchor="middle" class="small">completed conversations</text>

  <rect x="1190" y="1078" width="340" height="150" rx="16" ry="16" class="box decision" />
  <text x="1360" y="1114" text-anchor="middle" class="text">Phase 6: Accept candidate?</text>
  <text x="1360" y="1144" text-anchor="middle" class="small">candidate_score >= baseline_score + min_delta</text>
  <text x="1360" y="1166" text-anchor="middle" class="small">hashes + session identity match</text>
  <text x="1360" y="1188" text-anchor="middle" class="small">weighted guardrails stay within tolerance</text>

  <rect x="1590" y="1038" width="250" height="100" rx="16" ry="16" class="box accent" />
  <text x="1715" y="1070" text-anchor="middle" class="text">Accept path</text>
  <text x="1715" y="1098" text-anchor="middle" class="small">candidate of the agent under</text>
  <text x="1715" y="1120" text-anchor="middle" class="small">evaluation becomes active</text>

  <rect x="1590" y="1172" width="250" height="100" rx="16" ry="16" class="box" />
  <text x="1715" y="1204" text-anchor="middle" class="text">Reject path</text>
  <text x="1715" y="1232" text-anchor="middle" class="small">keep previous active version of</text>
  <text x="1715" y="1254" text-anchor="middle" class="small">the agent under evaluation</text>

  <rect x="1190" y="1308" width="340" height="120" rx="16" ry="16" class="box decision" />
  <text x="1360" y="1344" text-anchor="middle" class="text">Phase 7: Stop condition?</text>
  <text x="1360" y="1372" text-anchor="middle" class="small">stop if threshold score achieved</text>
  <text x="1360" y="1394" text-anchor="middle" class="small">or if k iterations reached</text>

  <rect x="820" y="1323" width="300" height="90" rx="16" ry="16" class="box accent" />
  <text x="970" y="1359" text-anchor="middle" class="text">Stop session</text>

  <rect x="470" y="1323" width="280" height="90" rx="16" ry="16" class="box support" />
  <text x="610" y="1359" text-anchor="middle" class="text">Buckets</text>
  <text x="610" y="1387" text-anchor="middle" class="small">parallel execution only</text>

  <path d="M340 190 L430 190" class="line" />
  <path d="M240 240 L240 285" class="dashed" />
  <path d="M240 435 L240 455" class="dashed" />
  <path d="M760 190 L800 190" class="line" />
  <path d="M1160 190 L1210 190" class="line" />
  <path d="M1510 190 L1560 114" class="line" />
  <path d="M1510 190 L1560 220" class="line" />
  <path d="M1510 190 L1560 326" class="line" />
  <path d="M1700 370 L1700 410" class="line" />
  <path d="M1630 528 L1630 560" class="dashed" />
  <path d="M1570 682 L1570 780" class="line" />
  <path d="M1420 815 L1320 765" class="line" />
  <path d="M1420 845 L1320 890" class="line" />
  <path d="M1020 765 L960 765" class="line" />
  <path d="M1020 890 L960 890" class="line" />
  <path d="M660 765 L600 805" class="line" />
  <path d="M660 890 L600 850" class="line" />
  <path d="M300 828 L260 818" class="line" />
  <path d="M170 865 L170 1090" class="line" />
  <path d="M410 1156 L470 1148" class="line" />
  <path d="M770 1148 L820 1148" class="line" />
  <path d="M1140 1148 L1190 1148" class="line" />
  <path d="M1530 1148 L1590 1088" class="line" />
  <path d="M1530 1148 L1590 1222" class="line" />
  <path d="M1715 1138 L1715 1308 L1530 1308" class="line" />
  <path d="M1715 1272 L1715 1308" class="line" />
  <path d="M1190 1368 L1120 1368" class="line" />
  <path d="M1360 1308 L1360 1228" class="line" />
  <path d="M1190 1428 L1190 1516 L980 1516 L980 258" class="line" />

  <text x="1600" y="145" class="label">3 outputs</text>
  <text x="1510" y="760" class="label">phase 3</text>
  <text x="160" y="1060" class="label">next</text>
  <text x="1560" y="1095" class="label">yes</text>
  <text x="1560" y="1228" class="label">no</text>
  <text x="1080" y="1500" class="label">continue loop</text>
</svg>
